  /datarequest_browse:
    post:
      tags:
      - datarequest
      summary: "Get paginated datarequests, including size/modify date information.\n                \
        \    show non-archived data requests\n                    be reviewed\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sort_on:
                  type: string
                  description: Column to sort on ('name', 'modified')
                  default: '''name'''
                  nullable: false
                sort_order:
                  type: string
                  description: Column sort order ('asc' or 'desc')
                  default: '''asc'''
                  nullable: false
                offset:
                  type: integer
                  description: Offset to start browsing from
                  default: '0'
                  nullable: false
                limit:
                  type: integer
                  description: Limit number of results
                  default: '10'
                  nullable: false
                archived:
                  type: boolean
                  description: If true, show archived (i.e. rejected) data requests only. If false, only
                  default: 'False'
                  nullable: false
                dacrequests:
                  type: boolean
                  description: If true, show a DAC member's own data requests (instead of data requests
                    to
                  default: 'True'
                  nullable: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  status_info:
                    type: string
                    nullable: true
                  data:
                    nullable: true
        '400':
