openapi: 3.0.0
info:
  description: Yoda core ruleset containing iRODS and Python rules and policies useful for all Yoda environments.
  contact:
    email: l.r.westerhof@uu.nl
  version: 2.1.0
  title: Yoda datarequest API
servers:
- url: https://portal.yoda.test/api
  description: Local Yoda development server
security:
- cookieAuth: []
- basicAuth: []
components:
  schemas:
    result_error:
      type: object
      properties:
        status:
          type: string
          description: Holds an error ID
        status_info:
          type: string
          description: Holds a human-readable error description
        data:
          description: empty
          nullable: true
          type: object
  securitySchemes:
    cookieAuth:
      in: cookie
      type: apiKey
      name: yoda_session
    basicAuth:
      type: http
      scheme: basic
  responses:
    status_400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/result_error'
    status_500:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/result_error'
paths:
  /datarequest_action_permitted:
    post:
      tags:
      - datarequest
      summary: 'Wrapper around datarequest_action_permitted.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - request_id
              - roles
              - statuses
              properties:
                request_id:
                  type: string
                  description: Unique identifier of the data request
                  default: null
                  nullable: false
                roles:
                  type: array
                  description: 'List of permitted roles (possible values: PM, ED, DM, DAC, OWN, REV)'
                  default: null
                  nullable: false
                  items: {}
                statuses:
                  type: array
                  description: List of permitted current data request statuses or None (check skipped)
                  default: null
                  nullable: false
                  items: {}
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  status_info:
                    type: string
                    nullable: true
                  data:
                    nullable: true
        '400':
          $ref: '#/components/responses/status_400'
        '500':
          $ref: '#/components/responses/status_500'
  /datarequest_roles_get:
    post:
      tags:
      - datarequest
      summary: "Get roles of invoking user.\n                   if this parameter is missing)\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_id:
                  type: string
                  description: Unique identifier of the data request (OWN and REV roles will not be checked
                  default: None
                  nullable: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  status_info:
                    type: string
                    nullable: true
                  data:
                    nullable: true
        '400':
          $ref: '#/components/responses/status_400'
        '500':
          $ref: '#/components/responses/status_500'
  /datarequest_schema_get:
    post:
      tags:
      - datarequest
      summary: ''
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - schema_name
              properties:
                schema_name:
                  type: string
                  description: (undocumented)
                  default: null
                  nullable: false
                version:
                  type: string
                  description: (undocumented)
                  default: SCHEMA_VERSION
                  nullable: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
