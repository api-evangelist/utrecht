  - aid: utrecht:yoda
    name: Yoda Research Data Management Platform
    description: >-
      Yoda is an open-source, iRODS-based research data management service
      developed by Utrecht University for depositing, sharing, publishing, and
      preserving research data. It is programmatically accessible via the iRODS
      protocol (iCommands / python-irodsclient) and exposes an HTTP API layer in
      its open-source ruleset. Source and technical documentation are public;
      live data access is gated behind institutional credentials.
    humanURL: https://utrechtuniversity.github.io/yoda/
