aid: utrecht
name: Utrecht University
description: >-
  Utrecht University (Universiteit Utrecht) is a public research university in
  Utrecht, Netherlands, ranked #105 in the QS World University Rankings 2025. Its
  public developer and API footprint is centered on open research infrastructure
  rather than a formal developer portal: the Utrecht University Library runs a
  DSpace institutional repository exposing publication metadata via OAI-PMH, the
  university maintains a large public GitHub organization (UtrechtUniversity) that
  publishes open-source research software, and it develops Yoda, an iRODS-based
  research data management platform. There is no single consolidated, self-service
  API developer portal; most administrative and identity systems are gated behind
  institutional SolisID/SSO.
