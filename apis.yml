      of Utrecht University and UMC Utrecht researchers. Confirmed live as a
      DSpace 9 instance responding to standard OAI-PMH verbs (Identify,
      ListRecords, etc.).
    humanURL: https://www.uu.nl/en/university-library/utrecht-university-repository
